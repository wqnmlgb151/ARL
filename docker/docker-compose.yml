version: '3'

volumes:
  arl_db:
  arl_redis:

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: arl_web
    restart: unless-stopped
    depends_on:
      - mongodb
      - rabbitmq
      - redis
    ports:
      - "5003:443"
    volumes:
      - ./config-docker.yaml:/code/app/config.yaml
      - ./image:/code/app/tmp_screenshot
      - ./poc:/opt/ARL-NPoC/xing/plugins/upload_poc
    entrypoint: ["sh", "-c",
      "gen_crt.sh; nginx;
       wait-for-it.sh mongodb:27017;
       wait-for-it.sh rabbitmq:5672;
       wait-for-it.sh redis:6379;
       exec gunicorn -b 0.0.0.0:5003 app.main:arl_app -w 3 --access-logfile /dev/stdout"]
    environment:
      - LANG=en_US.UTF-8
      - TZ=Asia/Shanghai
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: arl_worker
    restart: unless-stopped
    depends_on:
      - mongodb
      - rabbitmq
      - redis
    volumes:
      - ./config-docker.yaml:/code/app/config.yaml
      - ./image:/code/app/tmp_screenshot
      - ./poc:/opt/ARL-NPoC/xing/plugins/upload_poc
    entrypoint: ["sh", "-c",
      "wait-for-it.sh mongodb:27017;
       wait-for-it.sh rabbitmq:5672;
       wait-for-it.sh redis:6379;
       celery -A app.celerytask.celery worker -l info -Q arlgithub -n arlgithub -c 2 -O fair &
       celery -A app.celerytask.celery worker -l info -Q arltask -n arltask -c 2 -O fair"]
    environment:
      - LANG=en_US.UTF-8
      - TZ=Asia/Shanghai
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: arl_scheduler
    restart: unless-stopped
    depends_on:
      - mongodb
      - rabbitmq
    volumes:
      - ./config-docker.yaml:/code/app/config.yaml
    entrypoint: ["sh", "-c",
      "wait-for-it.sh mongodb:27017;
       wait-for-it.sh rabbitmq:5672;
       exec python3 -m app.scheduler"]
    environment:
      - LANG=en_US.UTF-8
      - TZ=Asia/Shanghai

  mongodb:
    image: mongo:4.0.27
    container_name: arl_mongodb
    restart: always
    volumes:
      - arl_db:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      - MONGO_INITDB_DATABASE=arl
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin

  rabbitmq:
    image: rabbitmq:3.13.1-management-alpine
    container_name: arl_rabbitmq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_PASS=arlpassword
      - RABBITMQ_DEFAULT_USER=arl
      - RABBITMQ_DEFAULT_VHOST=arlv2host
    logging:
      driver: "json-file"
      options:
        max-size: "1M"
        max-file: "10"

  redis:
    image: redis:7-alpine
    container_name: arl_redis
    restart: always
    volumes:
      - arl_redis:/data
    command: redis-server --appendonly yes --requirepass ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "1M"
        max-file: "10"
